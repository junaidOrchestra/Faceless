server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static UI.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + video downloads to the backend on the compose network.
    location /api/ {
        proxy_pass http://backend:8800/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Pipelines are long-running; let polling + large downloads breathe.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
